name: Build & Deploy to AWS

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # required for OIDC -> AWS
  packages: write   # required to push to ghcr.io

concurrency:
  group: deploy-master
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/revitalkremer/mygreenplanner

jobs:
  build-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-24.04-arm   # native ARM64 build for the t4g EC2
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push mgp-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: DevOps/Dockerfile.mgp-service
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_BASE }}-mgp-service:latest
            ${{ env.IMAGE_BASE }}-mgp-service:${{ github.sha }}
          cache-from: type=gha,scope=mgp-service
          cache-to: type=gha,mode=max,scope=mgp-service

      - name: Build & push mgp-webapp
        uses: docker/build-push-action@v5
        with:
          context: .
          file: DevOps/Dockerfile.frontend
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_BASE }}-mgp-webapp:latest
            ${{ env.IMAGE_BASE }}-mgp-webapp:${{ github.sha }}
          cache-from: type=gha,scope=mgp-webapp
          cache-to: type=gha,mode=max,scope=mgp-webapp

  deploy:
    name: Deploy to EC2 via SSM
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload prod compose file to S3
        run: |
          aws s3 cp DevOps/docker-compose.prod.yml \
            "s3://${{ secrets.AWS_DEPLOY_BUCKET }}/deploy/docker-compose.yml" \
            --sse AES256

      - name: Trigger deployment on EC2 (SSM Run Command)
        id: ssm
        env:
          BUCKET: ${{ secrets.AWS_DEPLOY_BUCKET }}
          REGION: ${{ secrets.AWS_REGION }}
          INSTANCE: ${{ secrets.AWS_INSTANCE_ID }}
        run: |
          set -e
          cat > /tmp/deploy-cmds.json <<JSON
          {
            "commands": [
              "set -eux",
              "cd /opt/mgp",
              "/snap/bin/aws s3 cp s3://${BUCKET}/deploy/docker-compose.yml docker-compose.yml --region ${REGION}",
              "chown ubuntu:ubuntu docker-compose.yml",
              "sudo -u ubuntu docker compose --env-file .env pull",
              "sudo -u ubuntu docker compose --env-file .env up -d --remove-orphans",
              "sudo -u ubuntu docker system prune -f",
              "sudo -u ubuntu docker compose --env-file .env ps"
            ]
          }
          JSON

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/deploy-cmds.json \
            --timeout-seconds 600 \
            --query "Command.CommandId" --output text)
          echo "cmd=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "SSM command: $CMD_ID"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] $STATUS"
            case "$STATUS" in
              Success)  exit 0 ;;
              Failed|TimedOut|Cancelled) exit 1 ;;
            esac
            sleep 5
          done
          echo "Deployment timed out"
          exit 1

      - name: Print deployment logs
        if: always()
        env:
          INSTANCE: ${{ secrets.AWS_INSTANCE_ID }}
          CMD: ${{ steps.ssm.outputs.cmd }}
        run: |
          [ -z "$CMD" ] && { echo "No command id (earlier step failed)"; exit 0; }
          echo "=== STDOUT ==="
          aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE" --query "StandardOutputContent" --output text || true
          echo "=== STDERR ==="
          aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE" --query "StandardErrorContent" --output text || true
