version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mgp
      POSTGRES_USER: mgp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mgp"]
      interval: 5s
      timeout: 5s
      retries: 5

  mgp-service:
    build:
      context: ..
      dockerfile: DevOps/Dockerfile.mgp-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://mgp:${POSTGRES_PASSWORD}@db:5432/mgp
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://localhost:5173,http://localhost:5174,http://localhost:3000,${FRONTEND_URL}"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  sam-service:
    build:
      context: ..
      dockerfile: DevOps/Dockerfile.sam-service
    restart: unless-stopped
    volumes:
      - sam_checkpoints:/app/checkpoints
    environment:
      - PYTHONUNBUFFERED=1

  mgp-webapp:
    build:
      context: ..
      dockerfile: DevOps/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - mgp-service
      - sam-service
    ports:
      - "80:80"

volumes:
  pg_data:
  sam_checkpoints:
