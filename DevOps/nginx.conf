server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver; re-resolve every 30s
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/mgp/ {
        set $mgp_upstream http://mgp-service:8000;
        rewrite ^/api/mgp/(.*)$ /$1 break;
        proxy_pass $mgp_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/sam/ {
        set $sam_upstream http://sam-service:8000;
        rewrite ^/api/sam/(.*)$ /$1 break;
        proxy_pass $sam_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20M;
    }
}
