server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver; re-resolve every 30s
    resolver 127.0.0.11 valid=30s ipv6=off;

    # SPA shell — never cache. Every request to /, /index.html, or any client-side
    # route gets a fresh index.html that references the latest hashed bundle.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Vite hashed assets (filenames include content hash) — safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # PWA service worker + registration + manifest must not be cached so updates take effect.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location /api/mgp/ {
        set $mgp_upstream http://mgp-service:8000;
        rewrite ^/api/mgp/(.*)$ /$1 break;
        proxy_pass $mgp_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 100M;
    }

    location /api/sam/ {
        set $sam_upstream http://sam-service:8000;
        rewrite ^/api/sam/(.*)$ /$1 break;
        proxy_pass $sam_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20M;
    }
}
